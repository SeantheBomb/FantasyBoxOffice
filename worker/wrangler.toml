name = "fantasy-box-office-weekly-report"
main = "src/index.js"
compatibility_date = "2025-12-15"

[[d1_databases]]
binding = "DB"
database_name = "cf_auth_demo"
database_id = "5cdc4ff3-adf8-4b63-a15a-9d9b8f125866"

# Secrets (set via `wrangler secret put <NAME>`):
#   TMDB_TOKEN          — v4 bearer token for TMDB (movies + dailies jobs)
#   DISCORD_WEBHOOK_URL — channel webhook for the weekly standings post

# Daily 09:00 UTC  → movies refresh
# Daily 14:00 UTC  → dailies refresh
# Every minute     → settle expired auctions
# Monday 14:00 UTC → post weekly standings to Discord (9 AM ET / 6 AM PT)
[triggers]
crons = ["0 9 * * *", "0 14 * * *", "* * * * *", "0 14 * * 1"]
